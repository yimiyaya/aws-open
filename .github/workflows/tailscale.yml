name: Tailscale Yes

on:
  workflow_dispatch:
    inputs:
      runner-type:
        description: runner machine type
        type: string
        required: false
        default: 'ubuntu-24.04'
      idle-timeout:
        description: idle timeout in seconds (0 to disable)
        type: number
        required: false
        default: 600
      free-space:
        description: free space
        type: boolean
        required: false
        default: false

jobs:
  yyds:
    runs-on: ${{ inputs.runner-type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:not
          args: --advertise-exit-node --ssh

      - name: Free Disk Space (Ubuntu)
        if: ${{ inputs.free-space }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Init Shell and Interceptors
        run: |
          sudo bash .github/scripts/setup.sh

      - name: Keep Runner Alive and Monitor Idle
        env:
          IDLE_TIMEOUT: ${{ inputs.idle-timeout }}
        run: |
          echo "Runner is active. Connect via Tailscale SSH and run 'poweroff' to terminate."
          
          # Run idle watcher in background
          sudo IDLE_TIMEOUT=${{ inputs.idle-timeout }} bash .github/scripts/idle-watcher.sh &
          
          # Main loop to wait for signal
          while [ ! -f /tmp/stop_runner ]; do 
            sleep 30
          done
          
          echo "$(date): Shutdown signal received. Exiting loop."
