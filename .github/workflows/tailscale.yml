name: Tailscale Yes

on:
  workflow_dispatch:
    inputs:
      runner-type:
        description: runner machine type
        type: string
        required: false
        default: ubuntu-24.04
      idle-timeout:
        description: idle timeout in seconds (0 to disable)
        type: number
        required: false
        default: 120
      free-space:
        description: free space
        type: boolean
        required: false
        default: false

jobs:
  yyds:
    runs-on: ${{ inputs.runner-type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Custom Hostname
        run: |
          sudo su - root << 'EOF'
          OWNER=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          HOSTNAME="runner-$OWNER"
          hostnamectl set-hostname "$HOSTNAME"
          EOF

      - name: Enable TCP BBR Congestion Control
        run: |
          sudo su - root << 'EOF'
          echo "net.core.default_qdisc=fq" >> /etc/sysctl.d/99-tailscale.conf
          echo "net.ipv4.tcp_congestion_control=bbr" >> /etc/sysctl.d/99-tailscale.conf
          echo "net.ipv4.ip_forward=1" >> /etc/sysctl.d/99-tailscale.conf
          echo "net.ipv6.conf.all.forwarding=1" >> /etc/sysctl.d/99-tailscale.conf
          sysctl -p /etc/sysctl.d/99-tailscale.conf
          EOF

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:not,tag:ci
          args: --advertise-exit-node --ssh
          hostname: aws

      - name: Free Disk Space (Ubuntu)
        if: ${{ inputs.free-space }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Init Shell and Interceptors
        env:
          IDLE_TIMEOUT: ${{ inputs.idle-timeout }}
        run: |
          sudo -E bash .github/scripts/setup.sh

      - name: Keep Runner Alive
        run: |
          echo "Runner is active. Connect via Tailscale SSH and run 'poweroff' to terminate."
          
          # Main loop to wait for signal
          while [ ! -f /tmp/stop_runner ]; do 
            sleep 30
          done
          
          echo "$(date): Shutdown signal received. Exiting loop."
